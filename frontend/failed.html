<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed | SleekPay</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .glass-card { text-align: center; padding: 60px 40px; }
        .status-icon { font-size: 5rem; margin-bottom: 20px; color: #ef4444; }
        h2 { margin-bottom: 16px; font-size: 1.8rem; }
        p { color: #94a3b8; margin-bottom: 32px; }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <main class="payment-wrapper">
        <div class="glass-card">
            <div class="status-icon">❌</div>
            <h2>Payment Failed</h2>
            <p>We couldn't process your payment. Please try again or use a different method.</p>
            <a href="index.html" class="glass-btn" style="text-decoration: none; display: flex;">Try Again</a>
        </div>
    </main>
</body>
</html>
